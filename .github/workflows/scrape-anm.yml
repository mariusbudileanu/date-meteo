name: Scrape ANM

on:
  schedule:
    # Ore UTC. România e UTC+3 vara → 05/08/11/14/17 UTC ≈ 08/11/14/17/20 local.
    # ANM publică buletinul principal dimineața; ajustează după nevoie.
    - cron: "0 5,8,11,14,17 * * *"
  workflow_dispatch: {}   # permite rulare manuală din tab-ul Actions

# CHEIE: fără asta, `git push` eșuează cu 403 (cauză frecventă a „cron-ul nu merge").
permissions:
  contents: write

concurrency:
  group: scrape-anm
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Niciun `pip install` — scraperul folosește doar biblioteca standard.

      - name: Rulează scraperul
        run: python src/scraper.py
        # Dacă site-ul Pages e servit din rădăcina repo-ului (nu din public/):
        #   env:
        #     METEO_OUT: "."

      - name: Commit & push dacă s-a schimbat ceva
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data public/istoric
          if git diff --staged --quiet; then
            echo "Nimic de comis — fără modificări."
          else
            git commit -m "Update avertizări ANM ($(date -u +%FT%TZ))"
            git push
          fi
