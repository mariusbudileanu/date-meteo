name: Scrape ANM and Deploy Pages

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "public/**"
      - "manual_nowcasting/**"
      - "src/**"
      - "requirements.txt"
      - "README.md"
      - ".github/workflows/scrape-anm.yml"
      - "CODEX_INSTRUCTIONS.md"

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "meteoalertro-pages"
  cancel-in-progress: false

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    outputs:
      pushed_changes: ${{ steps.commit.outputs.pushed_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python src/scraper.py

      - name: Commit generated data if changed
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data/ public/istoric/ || true

          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
            echo "pushed_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update ANM generated data"
            git push origin main
            echo "pushed_changes=true" >> "$GITHUB_OUTPUT"
          fi

  deploy_pages:
    needs: scrape_and_commit
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest generated data
        run: |
          git pull --ff-only origin main

      - name: Verify public folder before deploy
        run: |
          test -f public/index.html
          test -f public/css/style.css
          test -f public/js/app.js
          test -f public/data/index.json
          test -f public/data/latest.geojson
          test -f public/data/history_stats.json
          echo "Public folder is ready for GitHub Pages deployment."
          find public -maxdepth 3 -type f | sort | head -100

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./public"

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
