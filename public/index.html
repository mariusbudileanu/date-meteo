<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MeteoAlertRO</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQn4p8sQj0tTXqI7ZpN3TTe9hksQoxU="
      crossorigin=""
    >
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>MeteoAlertRO</h1>
        <p id="status" role="status" aria-live="polite">Se încarcă...</p>
      </div>
      <label class="date-control" for="alert-date-picker">
        <span>Data</span>
        <input type="date" id="alert-date-picker">
      </label>
    </header>

    <main>
      <div id="alerts-map" aria-label="Hartă avertizări meteo România"></div>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
